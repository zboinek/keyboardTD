# Serves the static game and proxies the hall-of-fame API, same origin.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # The only hop in front of us is the host's nginx-proxy, connecting over
    # the docker network; trust the X-Real-IP *it* sets (it always overwrites
    # the client's) and nobody else's. $remote_addr then resolves to the real
    # client, so the API's rate limit can't be dodged by rotating a header.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Real-IP;

    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
