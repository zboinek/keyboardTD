# On every version tag (v1.2.3), build the web (WebAssembly) image and push
# it to GitHub Container Registry as both :<tag> and :latest, for amd64 and
# arm64 hosts. Pull with:  docker run -p 8080:80 ghcr.io/<owner>/<repo>:latest

name: docker

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces ghcr.io/<owner>/<repo>:<tag> and :latest (lowercased).
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          # The wasm build stage is pinned to amd64 inside the Dockerfile;
          # only the tiny nginx runtime stage differs per platform.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
